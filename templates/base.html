<!-- base.html -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CountInMind 是一款針對加法、減法、混合心算練習的線上工具，提供多種難度讓你強化計算能力。">
    <meta name="keywords" content="線上心算, web版工具, 練習工具, CountInMind, mental math, 網頁版app, Python Flask, 國小生適用, 加強計算能力, 數學運算">
    <meta name="author" content="farloveway">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <!-- 加入 icon -->
    <link rel="icon" href="{{ url_for('static', filename='CountInMindIco.ico') }}" type="image/x-icon">

    <style>
        body {
            background-color: #B6E3B9; /* 預設背景淺綠色 */
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
