<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CountInMind 是一款針對加法、減法、混合心算練習的線上工具，提供多種難度讓你強化計算能力。">
    <meta name="keywords" content="線上心算, web版工具, 練習工具, CountInMind, mental math, 網頁版app, Python Flask, 國小生適用, 加強計算能力, 數學運算">
    <meta name="author" content="farloveway">
    <meta name="google-site-verification" content="3AiBDBBuDdvpah6ClsXYhbAqz_I6Mk53-J5Jv88Y6xI" />
    <title>CountInMind - 模式選擇</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 加入 icon -->
    <link rel="icon" href="{{ url_for('static', filename='CountInMindIco.ico') }}" type="image/x-icon">
    <style>
        body {
            background-color: #B6E3B9; /* 綠色主題 */
            font-family: 'Microsoft JhengHei', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 370px;
            height: 663px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            background-color: #77cc88;
        }
        h1 {
            font-size: 30px;
            color: #333;
            text-align: center;
        }
        .instruction {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 20px;
            font-size: 18px;
            color: #333;
            white-space: pre-line;
            margin: 10px ;
        }
        .button {
            display: block;
            margin: 10px auto;
            padding: 16px;
            font-size: 24px;
            width: 260px;
            border: none;
            border-radius: 20px;
            background-color: #fcecec;
            color: #333;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .button:hover {
            background-color: #d9f3dd;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #333;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <h1>歡迎使用心算大神</h1>
            <div class="instruction">
                作品說明:<br>這是作者本人在國小高年級時，每堂課導師都會依序念幾個數字考心算加總，本人認為這樣方式有助於運算能力。<br>話不多說，那馬上來測試，請點擊以下模式:
            </div>
        </div>
        <form action="/select_mode" method="post" onsubmit="setMode(event)">
            <button class="button" name="mode" value="add">加法</button>
            <button class="button" name="mode" value="sub">減法</button>
            <button class="button" name="mode" value="mix">加(減)法</button>
        </form>
        <!-- 新增的重新輸入暱稱按鈕 -->
        <button class="button" type="button" onclick="resetNickname()">← 重新輸入暱稱</button>
        <div class="footer">
            <a href="https://vocus.cc/salon/icanbe">about author Icanbe(click me)</a>
        </div>
    </div>
    <!-- 暱稱輸入 Modal -->
    <div class="modal fade" id="nicknameModal" tabindex="-1" aria-labelledby="nicknameModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="nicknameModalLabel">請先輸入暱稱</h5>
                </div>
                <div class="modal-body">
                    <form onsubmit="saveNickname(); return false;">
                      <input type="text" id="nicknameInput" class="form-control" placeholder="你的暱稱" required>
                    </form>
                </div>                  
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="saveNickname()">送出</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let nickname = localStorage.getItem('nickname');
        // 進入頁面後自動檢查是否已經輸入暱稱
        window.onload = function () {
          const nickname = localStorage.getItem('nickname');
          if (!nickname) {
            const nicknameModal = new bootstrap.Modal(document.getElementById('nicknameModal'));
            nicknameModal.show();
          }
        };
      
        // 儲存暱稱至 localStorage
        function saveNickname() {
          const nickname = document.getElementById('nicknameInput').value.trim();
          if (nickname === "") {
            alert("暱稱不能為空");
            return;
          }
          localStorage.setItem('nickname', nickname);
          const modal = bootstrap.Modal.getInstance(document.getElementById('nicknameModal'));
          modal.hide();
        }
        function setMode(event) {
            const mode = event.submitter.value;
            localStorage.setItem('mode', mode);
        }
        // 若你想在頁面加個「重新輸入暱稱」按鈕，也可以這樣寫：
        function resetNickname() {
          localStorage.removeItem('nickname');
          location.reload();
        }
      </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>      
</body>
</html>
